<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Build - ESP-HACK</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/site-nav.js?v=4" defer></script>
  </head>
  <body>
    <div class="lang-switch lang-switch--en" role="navigation" aria-label="Language">
      <div class="lang-switch__track">
        <span class="lang-switch__thumb" aria-hidden="true"></span>
        <a href="../page-build.html" class="lang-switch__opt">RU</a>
        <span class="lang-switch__opt lang-switch__opt--current" aria-current="page">EN</span>
      </div>
    </div>
    <div class="shell shell--nav-left">
      <aside class="sidebar" aria-label="Section navigation">
        <div class="sidebar__inner">
          <a class="sidebar__brand" href="https://github.com/Teapot174/ESP-HACK" aria-label="ESP-HACK GitHub">ESP-HACK</a>
          <nav aria-label="Wiki sections">
            <div id="site-nav-container"></div>
          </nav>
        </div>
      </aside>

      <main class="content">
        <div class="content__wrap">
          <h1>Build</h1>

          <h2 id="pcb">PCB</h2>
          <figure class="flash-install-figure">
            <img src="../images/build-pcb.png" alt="ESP-HACK PCB board" width="900" height="760" />
          </figure>
          <p>Thanks Dripside!</p>

          <h2 id="required-components">Required Components</h2>
          <div class="table-wrap">
            <table class="module-table">
              <thead>
                <tr>
                  <th scope="col">Component</th>
                  <th scope="col">Link</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <th scope="row">ESP32-WROOM</th>
                  <td><a href="https://aliexpress.com/item/1005007817121199.html">TAP</a></td>
                </tr>
                <tr>
                  <th scope="row">CC1101</th>
                  <td><a href="https://aliexpress.com/item/1005008544032996.html">TAP</a></td>
                </tr>
                <tr>
                  <th scope="row">Display SH1106</th>
                  <td><a href="https://aliexpress.com/item/1005004464878029.html">TAP</a></td>
                </tr>
                <tr>
                  <th scope="row">SD Module</th>
                  <td><a href="https://aliexpress.com/item/32674518514.html">TAP</a></td>
                </tr>
                <tr>
                  <th scope="row">Buttons</th>
                  <td><a href="https://aliexpress.com/item/4000452176168.html">TAP</a></td>
                </tr>
                <tr>
                  <th scope="row">IR-TX, IR-RX</th>
                  <td><a href="https://aliexpress.com/item/1005007446501425.html">TAP</a></td>
                </tr>
              </tbody>
            </table>
          </div>

          <h2 id="connection-scheme">Connection Scheme</h2>
          <figure class="flash-install-figure">
            <img src="../images/build-scheme.png" alt="ESP-HACK connection scheme" width="760" height="1117" />
          </figure>
        </div>
      </main>
    </div>
  </body>
</html>
